openapi: 3.0.3
info:
  title: POE Tools API
  version: 1.0.0
  description: API for submitting TradeSearchRequest and retrieving simplified trade results.

servers:
  - url: http://localhost:3001

paths:
  /api/leagues:
    get:
      operationId: getApiLeagues
      summary: List available Path of Exile leagues
      responses:
        "200":
          description: List of leagues
          content:
            application/json:
              schema:
                type: object
                required:
                  - leagues
                properties:
                  leagues:
                    type: array
                    items:
                      $ref: "#/components/schemas/League"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/leagues/{league}/ninja-items:
    get:
      operationId: getApiLeagueNinjaItems
      summary: List ninja items (paginated, searchable)
      parameters:
        - $ref: "#/components/parameters/leagueParam"
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: Text to search for in the specified key (e.g., name)
        - in: query
          name: key
          schema:
            type: string
          required: false
          description: Field to search in (e.g., name)
        - in: query
          name: cursor
          schema:
            type: string
          required: false
          description: ID of the last item from the previous page (for pagination)
        - in: query
          name: limit
          schema:
            type: integer
          required: false
          description: Maximum number of items to return
      responses:
        "200":
          description: Paginated list of ninja items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/NinjaItem"
                  nextCursor:
                    type: string
                    nullable: true
                    description: Cursor for the next page, or null if no more items
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/leagues/{league}/resolve-item:
    post:
      operationId: postApiLeagueResolveItem
      summary: Resolve a trade item (fetch price and icon)
      parameters:
        - $ref: "#/components/parameters/leagueParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveItemRequest"
      responses:
        "200":
          description: Resolved item data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveItemResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/leagues/{league}/recipes:
    post:
      operationId: postApiLeagueRecipes
      summary: Create a recipe
      parameters:
        - $ref: "#/components/parameters/leagueParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecipeRequest"
      responses:
        "200":
          description: Created recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateRecipeResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: getApiLeagueRecipes
      summary: List recipes
      parameters:
        - $ref: "#/components/parameters/leagueParam"
        - in: query
          name: cursor
          schema:
            type: string
          required: false
        - in: query
          name: limit
          schema:
            type: integer
          required: false
        - in: header
          name: x-invalidate-cache
          schema:
            type: boolean
          required: false
          description: If true, forces backend to invalidate cache and fetch fresh data
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRecipesResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/leagues/{league}/recipes/{id}:
    get:
      operationId: getApiLeagueRecipeById
      summary: Get recipe details by id
      parameters:
        - $ref: "#/components/parameters/leagueParam"
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: header
          name: x-invalidate-cache
          schema:
            type: boolean
          required: false
          description: If true, forces backend to invalidate cache and fetch fresh data
      responses:
        "200":
          description: Recipe details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: putApiLeagueRecipeById
      summary: Update a recipe
      parameters:
        - $ref: "#/components/parameters/leagueParam"
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecipeRequest"
      responses:
        "200":
          description: Updated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteApiLeagueRecipeById
      summary: Delete a recipe
      parameters:
        - $ref: "#/components/parameters/leagueParam"
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Recipe deleted successfully
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    leagueParam:
      in: path
      name: league
      required: true
      schema:
        type: string
        minLength: 1
      description: The Path of Exile league name (e.g. "Standard", "Hardcore")
  schemas:
    League:
      type: object
      required:
        - id
        - realm
        - text
      properties:
        id:
          type: string
          description: League identifier used in API paths
        realm:
          type: string
          description: Platform realm (pc, xbox, sony)
        text:
          type: string
          description: Display name of the league
    NinjaItem:
      type: object
      required:
        - id
        - name
        - icon
        - category
        - detailsId
        - price
        - priceHistory
        - volume
        - maxVolumeCurrency
        - maxVolumeRate
        - fetchedAt
      properties:
        id:
          type: string
        name:
          type: string
        icon:
          type: string
        category:
          type: string
          enum:
            - Currency
            - Fragment
            - Runegraft
            - AllflameEmber
            - Tattoo
            - Omen
            - DivinationCard
            - Artifact
            - Oil
            - Scarab
            - Fossil
            - Resonator
            - Essence
        detailsId:
          type: string
        price:
          type: number
        priceHistory:
          type: array
          items:
            type: number
        volume:
          type: number
        maxVolumeCurrency:
          type: string
        maxVolumeRate:
          type: number
        fetchedAt:
          type: string
          format: date-time
    TradeSearchRequest:
      type: object
      properties:
        query:
          type: object
          description: Trade query object (structure may vary)
        sort:
          type: object
          additionalProperties:
            type: string
            enum: [asc, desc]
      required:
        - query

    TradeSearchResponse:
      type: object
      properties:
        result:
          type: array
          items:
            $ref: "#/components/schemas/SimplifiedListing"

    SimplifiedListing:
      type: object
      properties:
        id:
          type: string
        price:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: string

    ResolveItemRequest:
      type: object
      properties:
        tradeUrl:
          type: string
      required:
        - tradeUrl

    ResolveItemResponse:
      type: object
      properties:
        resolved:
          $ref: "#/components/schemas/ResolvedMarketData"
        search:
          $ref: "#/components/schemas/TradeSearchRequest"

    Price:
      type: object
      properties:
        amount:
          type: number
        currency:
          type: string
      required:
        - amount
        - currency

    ResolvedMarketData:
      type: object
      properties:
        iconUrl:
          type: string
        name:
          type: string
        minPrice:
          $ref: "#/components/schemas/Price"
        originalMinPrice:
          $ref: "#/components/schemas/Price"
        medianPrice:
          $ref: "#/components/schemas/Price"
        originalMedianPrice:
          $ref: "#/components/schemas/Price"
        medianCount:
          type: integer
          description: Number of listings at the median price or lower
        fetchedAt:
          type: string

    TradeItem:
      type: object
      required:
        - tradeUrl
        - search
      properties:
        tradeUrl:
          type: string
          description: The original trade URL for the item
        search:
          $ref: "#/components/schemas/TradeSearchRequest"
        resolved:
          $ref: "#/components/schemas/ResolvedMarketData"

    RecipeItem:
      type: object
      required:
        - qty
        - type
        - name
        - icon
        - item
      properties:
        qty:
          type: number
          format: float
          description: Quantity of this item in the recipe
        type:
          type: string
          enum: [trade, ninja]
          description: Discriminator copied from the item sub-object for convenient top-level access
        name:
          type: string
          description: Display name (from resolved.name for trade, or ninja.name)
        icon:
          type: string
          description: Icon URL (from resolved.iconUrl for trade, or ninja.icon)
        item:
          oneOf:
            - $ref: "#/components/schemas/TradeItem"
            - $ref: "#/components/schemas/NinjaItem"

    Recipe:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          description: Name of the recipe (prefilled from first output's name)
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/RecipeItem"
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/RecipeItem"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - inputs
        - outputs
        - createdAt
        - updatedAt

    CreateRecipeRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the recipe (required)
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/RecipeItem"
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/RecipeItem"
      required:
        - name
        - inputs
        - outputs

    UpdateRecipeRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the recipe (required)
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/RecipeItem"
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/RecipeItem"
      required:
        - name
        - inputs
        - outputs

    CreateRecipeResponse:
      type: object
      properties:
        recipe:
          $ref: "#/components/schemas/Recipe"
      required:
        - recipe

    ListRecipesResponse:
      type: object
      properties:
        recipes:
          type: array
          items:
            $ref: "#/components/schemas/Recipe"
        nextCursor:
          type: string
      required:
        - recipes
